name: Deploy to Vercel Production

on:
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.ANIMATIONFACTORYGITHUBACTIONS }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required for Vercel deployment."
              missing=1
            fi
          done
          exit "$missing"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify
        run: npm run verify

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: npx vercel@latest deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN"
